<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galaxia Lavanda Pro 🪐</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050210; /* Negro profundo espacial */
            overflow: hidden; /* Evita scrolls */
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        /* Título flotante estilo Sci-Fi */
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #b39ddb;
            pointer-events: none; /* Para que el mouse pase a través */
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #7e57c2;
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <h1>Sistema Gemini v1.0</h1>
        <p>Interactividad Cuántica Activa</p>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, stars;
        const starCount = 400; // Cuántas estrellas quieres
        const mouse = { x: null, y: null };

        // Configurar tamaño del lienzo
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];

            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
        }

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                // Colores entre lavanda y blanco
                const colors = ['#ffffff', '#b39ddb', '#f3e5f5', '#7e57c2'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Si se sale de la pantalla, vuelve al otro lado
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Interacción con el mouse
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 150) {
                    this.x -= dx * 0.02;
                    this.y -= dy * 0.02;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Efecto de brillo (Glow)
                if (this.size > 1.5) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                } else {
                    ctx.shadowBlur = 0;
                }
            }
        }

        function animate() {
            // Limpiar con un poco de rastro (trail effect)
            ctx.fillStyle = 'rgba(5, 2, 16, 0.2)'; 
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('resize', init);

        init();
        animate();
    </script>
</body>
</html>

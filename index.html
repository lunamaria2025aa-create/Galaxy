<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY-LUNA 🌌 Pro System</title>
    <style>
        :root {
            --purpura: #7e57c2;
            --lavanda: #b39ddb;
            --espacio: #050210;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--espacio);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- FONDO DE ESTRELLAS ANIMADO --- */
        #starfield {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050210 100%);
        }

        /* --- CAPA DEL MAPA GALAXY-LUNA --- */
        #galaxy-map {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1), opacity 1s;
        }

        .header {
            position: absolute;
            top: 40px; width: 100%;
            text-align: center;
            letter-spacing: 12px;
            font-size: 2.5rem;
            color: var(--lavanda);
            text-shadow: 0 0 20px var(--purpura);
            text-transform: uppercase;
        }

        /* --- ESTILO DE LOS PLANETAS --- */
        .planet {
            position: absolute;
            width: 80px; height: 80px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .planet:hover {
            transform: scale(1.4);
            z-index: 100;
        }

        .planet-sphere {
            width: 50px; height: 50px;
            border-radius: 50%;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .planet-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--lavanda);
            white-space: nowrap;
        }

        /* --- VISTA DE ATERRIZAJE (DENTRO DEL PLANETA) --- */
        #landing-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            display: none; /* Oculto inicialmente */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
        }

        .info-card {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 30px;
            border: 2px solid var(--purpura);
            backdrop-filter: blur(10px);
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 50px var(--purpura);
        }

        .btn-exit {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--purpura);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div id="starfield"></div>

    <div id="galaxy-map">

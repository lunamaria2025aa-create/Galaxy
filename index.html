<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gemini Star Map v3.0</title>
    <style>
        :root {
            --neon-lila: #b39ddb;
            --neon-purple: #7e57c2;
            --glass: rgba(30, 10, 60, 0.7);
        }

        body {
            margin: 0;
            height: 100vh;
            background: #050210 url('https://www.transparenttextures.com/patterns/stardust.png');
            color: white;
            font-family: 'Courier New', Courier, monospace; /* Fuente estilo código */
            overflow: hidden;
            display: flex;
        }

        /* --- EFECTO DE SCANNER (RADAR) --- */
        body::after {
            content: "";
            position: absolute;
            top: 0; width: 100%; height: 2px;
            background: rgba(179, 157, 219, 0.2);
            box-shadow: 0 0 15px var(--neon-lila);
            animation: scan 4s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* --- MAPA ESTELAR --- */
        #star-map {
            flex: 1;
            position: relative;
            cursor: crosshair;
        }

        .planet {
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-lila);
            transition: 0.3s;
        }

        .planet:hover {
            transform: scale(1.5);
            box-shadow: 0 0 30px var(--neon-purple);
            cursor: pointer;
        }

        /* --- PANEL DE INFORMACIÓN (DERECHA) --- */
        #info-panel {
            width: 300px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-left: 2px solid var(--neon-purple);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
        }

        .panel-header {
            border-bottom: 1px solid var(--neon-lila);
            padding-bottom: 10px;
            color: var(--neon-lila);
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .data-row {
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            color: #d1c4e9;
        }

        .status-active { color: #00ffcc; font-weight: bold; }

        #btn-jump {
            margin-top: auto;
            background: transparent;
            border: 1px solid var(--neon-lila);
            color: var(--neon-lila);
            padding: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        #btn-jump:hover {
            background: var(--neon-purple);
            color: white;
            box-shadow: 0 0 15px var(--neon-purple);
        }
    </style>
</head>
<body>

    <div id="star-map">
        <div class="planet" style="top: 30%; left: 40%;" onclick="showInfo('Nebulosa Lavanda', 'Gaseosa', '-180°C', 'Activa')"></div>
        <div class="planet" style="top: 60%; left: 20%;" onclick="showInfo('Sector Gemini Prime', 'Rocoso', '22°C', 'Habitable')"></div>
        <div class="planet" style="top: 15%; left: 75%;" onclick="showInfo('Agujero Negro X-1', 'Colapso Estelar', 'Desconocida', 'Peligro')"></div>
    </div>

    <aside id="info-panel">
        <div class="panel-header">🛰️ Datos de Escaneo</div>
        
        <div id="display-content">
            <p>Selecciona un objeto estelar para iniciar el análisis...</p>
        </div>

        <button id="btn-jump">INICIAR SALTO HIPERESPACIAL</button>
    </aside>

    <script>
        function showInfo(nombre, tipo, temp, status) {
            const display = document.getElementById('display-content');
            
            // Efecto de sonido (opcional si tienes uno corto)
            // console.log("Escaneando " + nombre);

            display.innerHTML = `
                <h2 style="color:white">${nombre}</h2>
                <div class="data-row"><span>TIPO:</span> <span>${tipo}</span></div>
                <div class="data-row"><span>TEMP:</span> <span>${temp}</span></div>
                <div class="data-row"><span>ESTADO:</span> <span class="status-active">${status}</span></div>
                <br>
                <p style="font-size: 0.8rem; line-height: 1.4;">
                    Analizando composición atmosférica... <br>
                    Detectadas trazas de helio y partículas de luz lila.
                </p>
            `;
        }
    </script>
</body>
</html>

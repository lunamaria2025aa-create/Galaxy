<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GALAXY-LUNA 🌌</title>
    <style>
        body {
            margin: 0;
            background: #050210;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Título Principal */
        .titulo {
            text-align: center;
            margin-top: 50px;
            letter-spacing: 10px;
            color: #b39ddb;
            text-shadow: 0 0 20px #7e57c2;
            font-size: 3rem;
            text-transform: uppercase;
        }

        /* Contenedor de la Galaxia */
        #galaxy-map {
            position: relative;
            width: 100%;
            height: 80%;
            transition: 1s;
        }

        /* Estilo de los Planetas (Bolas de colores con brillo) */
        .planeta {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .planeta:hover {
            transform: scale(1.3);
        }

        .esfera {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-bottom: 5px;
        }

        .nombre {
            font-size: 0.7rem;
            color: #e1bee7;
            text-align: center;
            white-space: nowrap;
        }

        /* Vista cuando entras al planeta */
        #vista-planeta {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .caja-info {
            border: 2px solid #b39ddb;
            padding: 40px;
            border-radius: 30px;
            background: rgba(46, 26, 71, 0.5);
            box-shadow: 0 0 30px #7e57c2;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #7e57c2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1 class="titulo">Galaxy-Luna</h1>

    <div id="galaxy-map">
        <div class="planeta" style="top: 10%; left: 20%;" onclick="entrar('Agua', '#00d4ff', '🌊 Mundo de Agua: Océanos neón que brillan en la oscuridad.')">
            <div class="esfera" style="background: radial-gradient(circle, #00d4ff, #005f73); box-shadow: 0 0 20px #00d4ff;"></div>
            <div class="nombre">Galaxy-Agua</div>
        </div>

        <div class="planeta" style="top: 50%; left: 70%;" onclick="entrar('Chocolate', '#795548', '🍫 Mundo Chocolate: Montañas de brownie y ríos de sirope.')">
            <div class="esfera" style="background: radial-gradient(circle, #8d6e63, #3e2723); box-shadow: 0 0 20px #5d4037;"></div>
            <div class="nombre">Galaxy-Choco</div>
        </div>

        <div class="planeta" style="top: 20%; left: 75%;" onclick="entrar('Corazones', '#ff4081', '💖 Mundo Corazón: Todo es rosado y suena música romántica.')">
            <div class="esfera" style="background: radial-gradient(circle, #f06292, #880e4f); box-shadow: 0 0 20px #ff4081;"></div>
            <div class="nombre">Galaxy-Love</div>
        </div>

        <div class="planeta" style="top: 70%; left: 15%;" onclick="entrar('Árboles', '#00e676', '🌳 Mundo Árbol: Bosques que brillan en color lila.')">
            <div class="esfera" style="background: radial-gradient(circle, #00e676, #1b5e20); box-shadow: 0 0 20px #00e676;"></div>
            <div class="nombre">Galaxy-Nature</div>
        </div>

        <div class="planeta" style="top: 40%; left: 45%;" onclick="entrar('Música', '#ffeb3b', '🎵 Mundo Música: El suelo suena como un piano al caminar.')">
            <div class="esfera" style="background: radial-gradient(circle, #fff176, #f57f17); box-shadow: 0 0 20px #ffeb3b;"></div>
            <div class="nombre">Galaxy-Music</div>
        </div>

        <div class="planeta" style="top: 75%; left: 50%;" onclick="entrar('Caramelo', '#f06292', '🍭 Mundo Caramelo: Nubes de algodón de azúcar.')">
            <div class="esfera" style="background: radial-gradient(circle, #f48fb1, #ad1457); box-shadow: 0 0 20px #f06292;"></div>
            <div class="nombre">Galaxy-Candy</div>
        </div>
    </div>

    <div id="vista-planeta">
        <div class="caja-info">
            <h1 id="titulo-p"></h1>
            <p id="desc-p"></p>
            <button onclick="salir()">🚀 Volver a la Nave</button>
        </div>
    </div>

    <script>
        function entrar(nombre, color, desc) {
            document.getElementById('vista-planeta').style.display = 'flex';
            document.getElementById('titulo-p').innerText = "Aterrizando en " + nombre;
            document.getElementById('titulo-p').style.color = color;
            document.getElementById('desc-p').innerText = desc;
            document.getElementById('galaxy-map').style.opacity = '0';
        }

        function salir() {
            document.getElementById('vista-planeta').style.display = 'none';
            document.getElementById('galaxy-map').style.opacity = '1';
        }
    </script

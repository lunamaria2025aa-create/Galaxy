<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nave Gemini: Exploración Galáctica 💜</title>
    <style>
        :root {
            --purpura: #7e57c2;
            --lavanda: #b39ddb;
            --neon: #e1bee7;
        }

        body {
            margin: 0;
            background: #050210;
            color: white;
            font-family: 'Orbitron', sans-serif; /* Fuente futurista */
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* VISTA DE LA GALAXIA (LA VENTANA) */
        #viewport {
            width: 90%;
            height: 60vh;
            margin-top: 20px;
            border: 4px solid var(--purpura);
            border-radius: 50px 50px 0 0;
            position: relative;
            background: radial-gradient(circle, #2e1a47 0%, #050210 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(126, 87, 194, 0.5);
            overflow: hidden;
        }

        /* EL PLANETA QUE APARECE */
        #planet-view {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 30px white);
            transform: scale(0); /* Empieza oculto */
        }

        /* TABLERO DE CONTROL */
        #dashboard {
            width: 100%;
            height: 40vh;
            background: linear-gradient(to top, #1a0b2e, #050210);
            border-top: 5px solid var(--purpura);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
            box-sizing: border-box;
        }

        .btn-planet {
            background: rgba(126, 87, 194, 0.2);
            border: 2px solid var(--lavanda);
            color: var(--lavanda);
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-planet:hover {
            background: var(--purpura);
            color: white;
            box-shadow: 0 0 20px var(--lavanda);
            transform: translateY(-5px);
        }

        /* DESCRIPCIÓN DEL DESTINO */
        #mission-log {
            position: absolute;
            bottom: 20px;
            left: 50px;
            right: 50px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid var(--lavanda);
            font-size: 0.9rem;
        }

        /* ANIMACIÓN DE VIAJE */
        .hyperspace {
            animation: warp 1.5s infinite;
        }

        @keyframes warp {
            0% { box-shadow: 0 0 0px var(--lavanda); }
            50% { box-shadow: 0 0 100px var(--purpura); }
            100% { box-shadow: 0 0 0px var(--lavanda); }
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="planet-view"></div>
        <div id="mission-log">
            <b style="color: var(--lavanda);">SISTEMA DE NAVEGACIÓN:</b> Esperando coordenadas de destino...
        </div>
    </div>

    <div id="dashboard">
        <button class="btn-planet" onclick="travel('Agua', '#4fc3f7', '💧 Océanos infinitos de cristal neón detectados.')">🌊 Mundo Agua</button>
        <button class="btn-planet" onclick="travel('Chocolate', '#795548', '🍫 Lluvia de cacao y ríos de caramelo líquido.')">🍫 Mundo Choco</button>
        <button class="btn-planet" onclick="travel('Corazón', '#ff4081', '💖 Latidos rítmicos detectados en el núcleo.')">💖 Mundo Amor</button>
        <button class="btn-planet" onclick="travel('Bosque', '#00e676', '🌳 Árboles bioluminiscentes cantando al viento.')">🌳 Mundo Árbol</button>
        <button class="btn-planet" onclick="travel('Música', '#ffea00', '🎵 Ondas sonoras visibles en la atmósfera.')">🎵 Mundo Música</button>
        <button class="btn-planet" onclick="travel('Caramelo', '#f06292', '🍭 Nubes de algodón y suelo de gominola.')">🍭 Mundo Dulce</button>
    </div>

    <script>
        function travel(tipo, color, log) {
            const planet = document.getElementById('planet-view');
            const missionLog = document.getElementById('mission-log');
            const viewport = document.getElementById('viewport');

            // 1. Efecto de Salto (Warp)
            viewport.classList.add('hyperspace');
            planet.style.transform = "scale(0) rotate(180deg)";
            missionLog.innerHTML = `<b style="color: white;">SALTANDO AL ESPACIO...</b>`;

            setTimeout(() => {
                // 2. Llegada al destino
                viewport.classList.remove('hyperspace');
                planet.style.background = `radial-gradient(circle, ${color} 0%, #000 100%)`;
                planet.style.boxShadow = `0 0 50px ${color}`;
                planet.style.transform = "scale(1.2) rotate(0deg)";
                missionLog.innerHTML = `<b style="color: ${color};">DESTINO: PLANETA ${tipo.toUpperCase()}</b><br>${log}`;
            }, 1500);
        }
    </script>
</body>
</html>

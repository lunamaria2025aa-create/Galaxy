<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nebulosa Procedural 💜</title>
    <style>
        :root {
            --bg: #050210;
            --color1: #7e57c2; /* Violeta */
            --color2: #b39ddb; /* Lavanda */
            --color3: #f48fb1; /* Rosa suave */
            --color4: #4a148c; /* Morado profundo */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* EL CONTENEDOR DE LA MAGIA */
        .nebula-container {
            position: relative;
            width: 100%;
            height: 100%;
            /* El truco pro: desenfoque masivo + contraste alto */
            filter: blur(80px) contrast(150%);
            background: var(--bg);
        }

        /* MANCHAS DE GAS (CAPAS DE COLOR) */
        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            mix-blend-mode: screen; /* Para que los colores se sumen */
            animation: move 20s infinite alternate ease-in-out;
        }

        /* Definimos cada mancha de gas */
        .blob-1 {
            width: 500px; height: 500px;
            background: var(--color1);
            top: 10%; left: 10%;
            animation-duration: 25s;
        }

        .blob-2 {
            width: 600px; height: 600px;
            background: var(--color2);
            bottom: 10%; right: 10%;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 400px; height: 400px;
            background: var(--color3);
            top: 40%; left: 30%;
            animation-duration: 20s;
            animation-delay: -2s;
        }

        .blob-4 {
            width: 700px; height: 700px;
            background: var(--color4);
            bottom: 20%; left: 50%;
            animation-duration: 35s;
        }

        /* ANIMACIÓN DE MOVIMIENTO ORGÁNICO */
        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(100px, -50px) scale(1.2); }
            66% { transform: translate(-80px, 100px) scale(0.8); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* TEXTO ENCIMA (Sin el filtro de desenfoque) */
        .overlay-text {
            position: absolute;
            z-index: 10;
            font-family: 'Courier New', monospace;
            color: white;
            letter-spacing: 15px;
            text-transform: uppercase;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--color2);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="overlay-text">Nebulosa Gemini</div>

    <div class="nebula-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

</body>
</html>

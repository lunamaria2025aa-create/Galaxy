<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pixel Dress-Up Studio 🎀</title>
    <style>
        :root {
            --piel: #ffdbac;
            --lavanda: #b39ddb;
            --obscuro: #2c2c2c;
            --rosa: #f48fb1;
        }

        body {
            background-color: #f3e5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        /* CONTENEDOR PRINCIPAL */
        .game-container {
            display: flex;
            background: white;
            padding: 20px;
            border: 4px solid var(--obscuro);
            box-shadow: 10px 10px 0px var(--lavanda);
        }

        /* ÁREA DEL PERSONAJE */
        .character-preview {
            width: 200px;
            height: 300px;
            background: #eee;
            position: relative;
            border: 2px solid #ccc;
            margin-right: 20px;
            overflow: hidden;
        }

        /* --- CUERPO BASE (PROGRAMADO) --- */
        .base {
            position: absolute;
            bottom: 50px; left: 75px;
            width: 50px; height: 120px;
            background: var(--piel);
            border-radius: 10px;
        }
        .cabeza {
            position: absolute;
            bottom: 170px; left: 70px;
            width: 60px; height: 60px;
            background: var(--piel);
            border-radius: 15px;
        }

        /* --- CAPAS DE ROPA --- */
        .layer {
            position: absolute;
            display: none; /* Ocultas por defecto */
            z-index: 10;
        }

        /* Ropa Programada con CSS */
        #camisa-lila { 
            width: 54px; height: 60px; 
            background: var(--lavanda); 
            bottom: 110px; left: 73px; 
            border-radius: 5px;
        }
        #camisa-negra { 
            width: 54px; height: 60px; 
            background: var(--obscuro); 
            bottom: 110px; left: 73px; 
        }
        #falda-rosa {
            width: 60px; height: 40px;
            background: var(--rosa);
            bottom: 75px; left: 70px;
            border-radius: 0 0 10px 10px;
        }

        /* MENÚ DE SELECCIÓN */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .category-title {
            font-weight: bold;
            font-size: 0.8rem;
            color: var(--purpura);
            margin-bottom: 5px;
        }

        button {
            padding: 8px;
            cursor: pointer;
            border: 2px solid var(--obscuro);
            background: white;
            transition: 0.2s;
        }

        button:hover {
            background: var(--lavanda);
            transform: translateX(5px);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="character-preview">
            <div class="cabeza"></div>
            <div class="base"></div>

            <div id="camisa-lila" class="layer"></div>
            <div id="camisa-negra" class="layer"></div>
            <div id="falda-rosa" class="layer"></div>
        </div>

        <div class="menu">
            <div class="category-title">Partes de Arriba</div>
            <button onclick="poner('camisa-lila', 'tops')">Top Lavanda</button>
            <button onclick="poner('camisa-negra', 'tops')">Top Dark</button>
            <button onclick="quitar('tops')">❌ Quitar Top</button>

            <div class="category-title">Partes de Abajo</div>
            <button onclick="poner('falda-rosa', 'bottoms')">Falda Rosa</button>
            <button onclick="quitar('bottoms')">❌ Quitar Falda</button>
        </div>
    </div>

    <script>
        // Diccionario para saber qué ropa pertenece a qué categoría
        const categorias = {
            'camisa-lila': 'tops',
            'camisa-negra': 'tops',
            'falda-rosa': 'bottoms'
        };

        function poner(idRopa, categoria) {
            // Primero quitamos lo que haya en esa categoría para que no se encime
            quitar(categoria);
            // Mostramos la prenda seleccionada
            document.getElementById(idRopa).style.display = 'block';
        }

        function quitar(categoria) {
            // Buscamos todas las capas y ocultamos las de la categoría
            for (let id in categorias) {
                if (categorias[id] === categoria) {
                    document.getElementById(id).style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
